name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: autoattendance
          POSTGRES_PASSWORD: autoattendance
          POSTGRES_DB: autoattendance_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U autoattendance"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    defaults:
      run:
        working-directory: backend

    env:
      DATABASE_URL: postgresql+asyncpg://autoattendance:autoattendance@localhost:5432/autoattendance_test
      JWT_SECRET: ci-test-secret
      CORS_ORIGINS: http://localhost

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements-dev.txt

      - name: Install Python dependencies
        run: pip install -r requirements-dev.txt

      - name: Lint
        run: ruff check .

      - name: Test
        run: pytest -v

  face-worker:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: face-worker

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: face-worker/requirements-dev.txt

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends libglib2.0-0

      - name: Install Python dependencies
        run: |
          pip install -r requirements-dev.txt
          pip uninstall -y opencv-python
          pip install --force-reinstall --no-cache-dir opencv-python-headless==4.11.0.86

      - name: Lint
        run: ruff check .

      - name: Test
        run: pytest -v

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type-check and build
        run: npm run build
