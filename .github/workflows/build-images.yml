name: Build and push production images

# Manual only -- this doesn't deploy anything by itself, it just builds
# arm64 images (matching the Oracle Ampere production VM) and pushes them to
# GHCR. The actual `docker compose -f docker-compose.prod.yml pull && up -d`
# on the VM is still a deliberate manual step, not wired to this workflow.
on:
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: backend/Dockerfile
          platforms: linux/arm64
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/autoattendance-api:latest
            ghcr.io/${{ github.repository_owner }}/autoattendance-api:${{ github.sha }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: face-worker/Dockerfile
          platforms: linux/arm64
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/autoattendance-face-worker:latest
            ghcr.io/${{ github.repository_owner }}/autoattendance-face-worker:${{ github.sha }}
