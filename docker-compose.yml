services:

  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: autoattendance
      POSTGRES_PASSWORD: autoattendance
      POSTGRES_DB: autoattendance
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U autoattendance"]
      interval: 5s
      timeout: 3s
      retries: 10
    ports:
      - "5432:5432"

  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      face-worker:
        condition: service_started
    environment:
      DATABASE_URL: postgresql+asyncpg://autoattendance:autoattendance@postgres:5432/autoattendance
      JWT_SECRET: ${JWT_SECRET:-dev-only-secret-do-not-use-in-production}
      CORS_ORIGINS: http://localhost:5173
      FACE_WORKER_URL: http://face-worker:8001
    volumes:
      - ./backend:/app
    ports:
      - "8010:8000"
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  face-worker:
    build:
      context: .
      dockerfile: face-worker/Dockerfile
    restart: unless-stopped
    volumes:
      - ./face-worker:/app
    ports:
      - "8011:8001"
    command: uvicorn app:app --host 0.0.0.0 --port 8001 --reload

volumes:
  pgdata:
